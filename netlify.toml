[build]
  publish = "."

[[redirects]]
  from = "/admin"
  to = "/offline.html"
  status = 200

[[redirects]]
  from = "/subscriptions/plans"
  to = "/subscriptions/plans.html"
  status = 200

[[redirects]]
  from = "/subscriptions/dashboard"
  to = "/subscriptions/dashboard.html"
  status = 200

[[redirects]]
  from = "/subscriptions/plans/*"
  to = "/subscriptions/plans.html"
  status = 200

[[redirects]]
  from = "/subscriptions/dashboard/*"
  to = "/subscriptions/dashboard.html"
  status = 200

[[redirects]]
  from = "/app"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
